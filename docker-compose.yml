services:
  backend:
    build:
      context: ./services/backend
    container_name: eoh-backend
    environment:
      DATABASE_URL: sqlite:////data/eoh.db
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.10.102:11434}
      DISABLE_OPENAI: ${DISABLE_OPENAI:-true}
      RECEPTIONIST_MODEL: ${RECEPTIONIST_MODEL:-llama3.2:3b}
      AGENT_TIMEOUT_SECONDS: ${AGENT_TIMEOUT_SECONDS:-45}
      RECEPTIONIST_TIMEOUT_SECONDS: ${RECEPTIONIST_TIMEOUT_SECONDS:-120}
      PROFILE_NAME: ${PROFILE_NAME:-S}
      MAX_WORKERS: ${MAX_WORKERS:-2}
      HEAVY_WORKERS: ${HEAVY_WORKERS:-1}
    ports:
      - "8080:8090"
    volumes:
      - backend_data:/data
    depends_on:
      - redis

  eoh-portal:
    build:
      context: ./services/eoh-portal
    container_name: eoh-portal
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: eoh-redis
    ports:
      - "6379:6379"

volumes:
  backend_data:
